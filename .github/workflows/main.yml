name: Krionis Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install lint dependencies
        run: |
          python -m pip install -U pip
          pip install ruff==0.5.4 mypy==1.10.0

      - name: Ruff lint
        run: ruff check rag_llm_api_pipeline rag_orchestrator tests setup.py

      - name: Ruff format check
        run: ruff format --check rag_llm_api_pipeline rag_orchestrator tests setup.py

      - name: Mypy type check
        run: mypy --ignore-missing-imports --no-site-packages rag_llm_api_pipeline

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install docs dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements-docs.txt

      - name: Build docs
        run: mkdocs build --strict

  test:
    name: Syntax & regression tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint, docs]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install -U pip
          pip install "fastapi>=0.111" "uvicorn[standard]>=0.30" "pydantic>=2.7" "jinja2>=3.1" "pyyaml>=6.0.1" "pytest>=9" "httpx>=0.28"
          pip install -e . --no-deps

      - name: Syntax compile check
        run: |
          python - <<'PY'
          import pathlib

          roots = [
              pathlib.Path("rag_llm_api_pipeline"),
              pathlib.Path("rag_orchestrator"),
              pathlib.Path("tests"),
          ]
          files = [pathlib.Path("setup.py")]

          for root in roots:
              files.extend(root.rglob("*.py"))

          for path in files:
              compile(path.read_text(encoding="utf-8"), str(path), "exec")

          print("syntax compile ok")
          PY

      - name: Package import sanity
        run: |
          python - <<'PY'
          import importlib

          for module_name in [
              "rag_llm_api_pipeline",
              "rag_llm_api_pipeline.api.server",
              "rag_llm_api_pipeline.core.hitl",
              "rag_llm_api_pipeline.db.review_store",
              "rag_orchestrator",
              "rag_orchestrator.api.app",
              "rag_orchestrator.runtime.manager",
          ]:
              importlib.import_module(module_name)

          print("import sanity ok")
          PY

      - name: Run regression tests
        run: pytest tests -q

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t krionis-platform:test .
