name: Publish To PyPI

on:
  push:
    branches: [main]
    tags:
      - "pipeline-v*"
      - "orchestrator-v*"
    paths:
      - "setup.py"
      - "rag_orchestrator/setup.py"
      - "MANIFEST.in"
      - "README-Krionis-pipeline.md"
      - "rag_orchestrator/README.md"
      - "CHANGELOG.md"
      - "RELEASE_NOTES_*.md"
      - ".github/workflows/pypi-release.yml"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - both
          - pipeline
          - orchestrator

permissions:
  contents: read

jobs:
  publish_pipeline:
    name: Build and publish krionis-pipeline
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'pipeline' || inputs.package == 'both')) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/pipeline-v')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    # Keep the environment explicit so the OIDC token has a stable claim
    # that can be mirrored in PyPI's trusted publisher configuration.
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install -U pip
          pip install build twine

      - name: Validate repository slug references
        shell: bash
        run: |
          if ! grep -q "pkbythebay29/krionis-platform" setup.py; then
            echo "Root setup.py does not point to renamed repository slug."
            exit 1
          fi

      - name: Resolve pipeline versions
        id: versions
        shell: bash
        run: |
          LOCAL_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path("setup.py").read_text(encoding="utf-8")
          m = re.search(r'version\s*=\s*"([^"]+)"', text)
          if not m:
              raise SystemExit("Could not determine pipeline version from setup.py")
          print(m.group(1))
          PY
          )
          REMOTE_VERSION=$(python - <<'PY'
          import json, urllib.request
          try:
              with urllib.request.urlopen("https://pypi.org/pypi/krionis-pipeline/json", timeout=15) as r:
                  data = json.load(r)
              print(data["info"]["version"])
          except Exception:
              print("none")
          PY
          )
          echo "local=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE_VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$LOCAL_VERSION" == "$REMOTE_VERSION" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "No publish needed: pipeline version $LOCAL_VERSION already on PyPI."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Publish required: local $LOCAL_VERSION vs PyPI $REMOTE_VERSION."
          fi

      - name: Build pipeline package
        if: steps.versions.outputs.publish == 'true'
        shell: bash
        run: |
          rm -rf dist pipeline-dist
          python -m build
          mkdir -p pipeline-dist
          cp dist/* pipeline-dist/

      - name: Twine check (pipeline)
        if: steps.versions.outputs.publish == 'true'
        shell: bash
        run: python -m twine check pipeline-dist/*

      - name: Trusted publisher reference (pipeline)
        if: steps.versions.outputs.publish == 'true'
        shell: bash
        run: |
          echo "PyPI trusted publisher settings for krionis-pipeline:"
          echo "  Owner: pkbythebay29"
          echo "  Repository name: krionis-platform"
          echo "  Workflow name: pypi-release.yml"
          echo "  Environment name: pypi"

      - name: Publish pipeline to PyPI
        if: steps.versions.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pipeline-dist/

  publish_orchestrator:
    name: Build and publish krionis-orchestrator
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'orchestrator' || inputs.package == 'both')) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/orchestrator-v')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    # Keep the environment explicit so the OIDC token has a stable claim
    # that can be mirrored in PyPI's trusted publisher configuration.
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install -U pip
          pip install build twine

      - name: Validate repository slug references
        shell: bash
        run: |
          if ! grep -q "pkbythebay29/krionis-platform" rag_orchestrator/setup.py; then
            echo "Orchestrator setup.py does not point to renamed repository slug."
            exit 1
          fi

      - name: Resolve orchestrator versions
        id: versions
        shell: bash
        run: |
          LOCAL_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path("rag_orchestrator/setup.py").read_text(encoding="utf-8")
          m = re.search(r'version\s*=\s*"([^"]+)"', text)
          if not m:
              raise SystemExit("Could not determine orchestrator version from rag_orchestrator/setup.py")
          print(m.group(1))
          PY
          )
          REMOTE_VERSION=$(python - <<'PY'
          import json, urllib.request
          try:
              with urllib.request.urlopen("https://pypi.org/pypi/krionis-orchestrator/json", timeout=15) as r:
                  data = json.load(r)
              print(data["info"]["version"])
          except Exception:
              print("none")
          PY
          )
          echo "local=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE_VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$LOCAL_VERSION" == "$REMOTE_VERSION" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "No publish needed: orchestrator version $LOCAL_VERSION already on PyPI."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Publish required: local $LOCAL_VERSION vs PyPI $REMOTE_VERSION."
          fi

      - name: Build orchestrator package
        if: steps.versions.outputs.publish == 'true'
        shell: bash
        run: |
          rm -rf rag_orchestrator/dist orchestrator-dist
          cd rag_orchestrator
          python -m build
          cd ..
          mkdir -p orchestrator-dist
          cp rag_orchestrator/dist/* orchestrator-dist/

      - name: Twine check (orchestrator)
        if: steps.versions.outputs.publish == 'true'
        shell: bash
        run: python -m twine check orchestrator-dist/*

      - name: Trusted publisher reference (orchestrator)
        if: steps.versions.outputs.publish == 'true'
        shell: bash
        run: |
          echo "PyPI trusted publisher settings for krionis-orchestrator:"
          echo "  Owner: pkbythebay29"
          echo "  Repository name: krionis-platform"
          echo "  Workflow name: pypi-release.yml"
          echo "  Environment name: pypi"

      - name: Publish orchestrator to PyPI
        if: steps.versions.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: orchestrator-dist/
