<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Krionis Telemetry</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.9);
      --ink: #111111;
      --muted: #6e6e73;
      --line: rgba(17, 17, 17, 0.1);
      --fill: #111111;
      --fill-soft: rgba(17, 17, 17, 0.06);
      --shadow: 0 24px 60px rgba(15, 15, 15, 0.08);
      --radius-xl: 28px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(180deg, #fbfbfc 0%, var(--bg) 100%);
      color: var(--ink);
    }
    .shell { max-width: 1320px; margin: 0 auto; padding: 28px 20px 40px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .hero { margin-bottom: 18px; }
    .nav, .grid { display: grid; gap: 16px; }
    .nav { grid-template-columns: repeat(auto-fit, minmax(120px, max-content)); margin-bottom: 18px; }
    .grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .linkbtn, .item, .out {
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.88);
      padding: 14px 16px;
    }
    .linkbtn {
      display: inline-flex;
      justify-content: center;
      text-decoration: none;
      color: var(--ink);
      background: var(--fill-soft);
      font-weight: 600;
    }
    .linkbtn.active { background: var(--fill); color: white; }
    h1,h2,h3 { margin: 0; letter-spacing: -0.03em; }
    p { color: var(--muted); line-height: 1.6; }
    .tiny { color: var(--muted); font-size: 0.86rem; line-height: 1.55; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel hero">
      <h1>Telemetry</h1>
      <p>Live agent, queue, and route telemetry refreshed on the configured server interval.</p>
    </section>
    <nav class="nav">
      <a class="linkbtn" href="/">Operator</a>
      <a class="linkbtn active" href="/ui/telemetry">Telemetry</a>
      <a class="linkbtn" href="/ui/runtime">Runtime</a>
      <a class="linkbtn" href="/ui/configuration">Configuration</a>
      <a class="linkbtn" href="/ui/records">Records</a>
      <a class="linkbtn" href="/ui/reviews">Reviews</a>
    </nav>
    <section class="grid">
      <div class="panel">
        <h2>Sampling</h2>
        <div id="sampling-box" class="out tiny"></div>
      </div>
      <div class="panel">
        <h2>Capacity</h2>
        <div id="capacity-box" class="out tiny"></div>
      </div>
      <div class="panel">
        <h2>Agents</h2>
        <div id="agents-box" class="grid"></div>
      </div>
      <div class="panel">
        <h2>Microbatch Queues</h2>
        <div id="telemetry-box" class="grid"></div>
      </div>
      <div class="panel">
        <h2>Recent Routes</h2>
        <div id="routes-box" class="grid"></div>
      </div>
    </section>
  </main>
  <script>
    const samplingBox = document.getElementById("sampling-box");
    const capacityBox = document.getElementById("capacity-box");
    const agentsBox = document.getElementById("agents-box");
    const telemetryBox = document.getElementById("telemetry-box");
    const routesBox = document.getElementById("routes-box");
    let refreshHandle = null;
    let refreshSeconds = 5;

    function scheduleRefresh(seconds) {
      const next = Math.max(1, Number(seconds) || 5);
      if (next === refreshSeconds && refreshHandle) return;
      refreshSeconds = next;
      if (refreshHandle) clearInterval(refreshHandle);
      refreshHandle = setInterval(loadTelemetry, refreshSeconds * 1000);
    }

    function card(html) {
      return `<div class="item tiny">${html}</div>`;
    }

    async function loadTelemetry() {
      try {
        const res = await fetch("/platform/telemetry");
        const json = await res.json();
        scheduleRefresh(json.refresh?.telemetry_refresh_seconds || 5);
        samplingBox.innerHTML = `<strong>Sampled at</strong><br>${json.sampled_at || "unknown"}<br><br><strong>Refresh</strong><br>every ${refreshSeconds} seconds`;
        const capacity = json.orchestrator?.capacity || {};
        capacityBox.innerHTML = `<strong>Can start another</strong><br>${capacity.can_start_another ? "Yes" : "No"}<br><br><strong>Reason</strong><br>${capacity.reason || "unknown"}<br><br><strong>Free memory</strong><br>${capacity.available_memory_gb ?? "?"} GB / ${capacity.total_memory_gb ?? "?"} GB`;
        const agents = json.orchestrator?.active_agents || [];
        agentsBox.innerHTML = agents.length ? agents.map((agent) => card(`<strong>${agent.name || agent.task_id}</strong><br>${agent.agent_type} · ${agent.system || "unknown"} · ${agent.ready ? "ready" : "starting"}`)).join("") : card("<strong>No active agents</strong><br>Start one from the operator page.");
        const telemetry = json.orchestrator?.telemetry || {};
        const lines = Object.entries(telemetry).map(([name, stats]) => card(`<strong>${name}</strong><br>pending ${stats.pending ?? 0}<br>batches ${stats.total_batches ?? 0}<br>requests ${stats.total_requests ?? 0}`));
        telemetryBox.innerHTML = lines.length ? lines.join("") : card("<strong>No telemetry yet</strong>");
        const routes = json.recent_routes || [];
        routesBox.innerHTML = routes.length ? routes.map((route) => card(`<strong>${route.status}</strong><br>${route.question_preview || route.question || ""}<br><br>agent ${route.agent_task_id || "direct"}<br>trace ${route.trace_id || "n/a"}`)).join("") : card("<strong>No controlled queries yet</strong>");
      } catch (error) {
        samplingBox.textContent = error.message;
      }
    }

    loadTelemetry();
  </script>
</body>
</html>
