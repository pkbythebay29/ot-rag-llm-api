# ===============================
# krionis-orchestrator - local bridge config
# ===============================

assets:
  - name: TestSystem
    docs: []

models:
  active_profile: cpu-compact
  llm_model: Qwen/Qwen2.5-0.5B-Instruct
  device: cpu
  model_precision: auto
  quantization_backend: dynamic-int8
  low_cpu_mem_usage: true
  runtime_profiles:
    shared-compact:
      label: Shared Compact
      description: Reuse one compact inference and embedding runtime across agents.
      model_profile: cpu-compact
      inference_model: qwen-0.5b-instruct
      embedding_model: minilm-l6
    balanced-search:
      label: Balanced Search
      description: Balanced inference with a stronger embedding model.
      model_profile: cpu-balanced
      inference_model: qwen-1.5b-instruct
      embedding_model: bge-small-en-v1.5
  agent_assignments:
    default:
      runtime_profile: shared-compact
    by_agent_type:
      retriever:
        runtime_profile: shared-compact
      regulatory:
        runtime_profile: balanced-search

retriever:
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  top_k: 5
  index_dir: indices
  encode_batch_size: 32
  normalize_embeddings: false

llm:
  max_new_tokens: 256
  max_input_tokens: 3072
  repetition_penalty: 1.05
  no_repeat_ngram_size: 3
  stop_sequences:
    - "\n"
  preset: baseline
  presets:
    baseline:
      do_sample: false
      num_beams: 1
  prompt_template: |
    You are a precise, concise assistant for industrial systems.

    Question: {question}

    Context:
    {context}

    Answer:

settings:
  data_dir: data/manuals
  index_dir: indices
  force_rebuild_index: false
  use_cpu: true

orchestrator:
  batcher:
    max_batch: 8
    max_latency_ms: 5
    max_queue: 1024
  gatekeeper:
    default_tenant:
      rps: 20.0
      burst: 40
      timeout_s: 30.0
