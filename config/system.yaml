# ===============================
# krionis-platform — system.yaml
# ===============================

assets:
  - name: TestSystem
    docs: []  # Auto-Index all files in settings.data_dir

models:
  active_profile: cpu-compact
  llm_model: Qwen/Qwen2.5-0.5B-Instruct
  device: cpu
  model_precision: auto
  quantization_backend: dynamic-int8
  low_cpu_mem_usage: true
  inference_catalog:
    qwen-0.5b-instruct:
      label: Qwen 2.5 0.5B Instruct
      huggingface_id: Qwen/Qwen2.5-0.5B-Instruct
      size: small
      recommended_for_low_resource: true
      description: Smallest local instruct model for constrained CPU or low-memory hosts.
    qwen-1.5b-instruct:
      label: Qwen 2.5 1.5B Instruct
      huggingface_id: Qwen/Qwen2.5-1.5B-Instruct
      size: medium
      recommended_for_low_resource: true
      description: Balanced local instruct model when quality matters but memory is still limited.
    qwen-3b-instruct:
      label: Qwen 2.5 3B Instruct
      huggingface_id: Qwen/Qwen2.5-3B-Instruct
      size: large
      recommended_for_low_resource: false
      description: Higher-quality local instruct model that benefits from stronger hardware.
  embedding_catalog:
    minilm-l6:
      label: all-MiniLM-L6-v2
      huggingface_id: sentence-transformers/all-MiniLM-L6-v2
      size: small
      recommended_for_low_resource: true
      description: Compact embedding model with the best memory footprint for shared use.
    bge-small-en-v1.5:
      label: BAAI bge-small-en-v1.5
      huggingface_id: BAAI/bge-small-en-v1.5
      size: small
      recommended_for_low_resource: true
      description: Stronger compact embedding model for quality-sensitive search workloads.
    bge-base-en-v1.5:
      label: BAAI bge-base-en-v1.5
      huggingface_id: BAAI/bge-base-en-v1.5
      size: medium
      recommended_for_low_resource: false
      description: Higher-capacity embedding model when memory pressure is acceptable.
  profiles:
    cpu-compact:
      label: CPU Compact
      description: Smallest local profile for reliable CPU and air-gapped bring-up.
      llm_model: Qwen/Qwen2.5-0.5B-Instruct
      device: cpu
      use_cpu: true
      model_precision: auto
      quantization_backend: dynamic-int8
      low_cpu_mem_usage: true
    cpu-balanced:
      label: CPU Balanced
      description: Stronger CPU profile that still prefers int8 quantization.
      llm_model: Qwen/Qwen2.5-1.5B-Instruct
      device: cpu
      use_cpu: true
      model_precision: auto
      quantization_backend: dynamic-int8
      low_cpu_mem_usage: true
    gpu-quality:
      label: GPU Quality
      description: Higher-quality GPU profile with non-quantized CUDA runtime.
      llm_model: Qwen/Qwen2.5-3B-Instruct
      device: auto
      use_cpu: false
      model_precision: auto
      quantization_backend: auto
      low_cpu_mem_usage: true
  runtime_profiles:
    shared-compact:
      label: Shared Compact
      description: Reuse the same compact inference and embedding models across agents.
      model_profile: cpu-compact
      inference_model: qwen-0.5b-instruct
      embedding_model: minilm-l6
      recommend_for_low_resource: true
      reuse_recommended: true
    balanced-search:
      label: Balanced Search
      description: Balanced inference with a stronger search encoder for most local deployments.
      model_profile: cpu-balanced
      inference_model: qwen-1.5b-instruct
      embedding_model: bge-small-en-v1.5
      recommend_for_low_resource: true
      reuse_recommended: false
    quality-gpu:
      label: Quality GPU
      description: Higher-quality inference and retrieval intended for stronger GPU hosts.
      model_profile: gpu-quality
      inference_model: qwen-3b-instruct
      embedding_model: bge-base-en-v1.5
      recommend_for_low_resource: false
      reuse_recommended: false
  agent_assignments:
    default:
      runtime_profile: shared-compact
    by_agent_type:
      retriever:
        runtime_profile: shared-compact
      dialogue:
        runtime_profile: balanced-search
      regulatory:
        runtime_profile: balanced-search
    by_system: {}
    by_agent_name: {}
  resource_policy:
    low_memory_threshold_gb: 4.0
    high_cpu_threshold_percent: 90.0
    recommended_shared_profile: shared-compact
    smaller_runtime_profiles:
      - shared-compact
      - balanced-search
  use_harmony: false
  memory_strategy:
    use_expandable_segments: true
    max_memory_gb: null

retriever:
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  top_k: 5
  index_dir: indices
  encode_batch_size: 32
  normalize_embeddings: false

llm:
  max_new_tokens: 256
  max_input_tokens: 3072
  repetition_penalty: 1.05
  no_repeat_ngram_size: 3
  stop_sequences: ["\n"]
  prompt_version: prompt-v1

  preset: baseline  # baseline | beam | explore | drafts

  presets:
    baseline:
      do_sample: false
      num_beams: 1
    beam:
      do_sample: false
      num_beams: 6
      length_penalty: 1.1
      early_stopping: true
    explore:
      do_sample: true
      num_beams: 1
      temperature: 0.7
      top_p: 0.9
      # top_k: 50
    drafts:
      do_sample: true
      num_beams: 4
      temperature: 0.8
      top_p: 0.92
      num_return_sequences: 3

  prompt_template: |
    You are a precise, concise assistant for industrial systems.

    Strict rules:
    - Use the provided context to answer.
    - If the answer is not in the context, reply exactly with: I don't know.
    - Do not add any explanation, apology, or commentary.
    - Provide a single, final answer. Do not produce multiple attempts.
    - Do not mention the words "context", "question", "instructions", or your own limitations.
    - Do not include word counts or parenthetical notes.
    - Match requested formatting (e.g., bullet list, exactly N words) when specified; otherwise, write one clear paragraph.
    - Do not explain why you don't know.
    - Do not say "Final answer" or repeat yourself.
    - Do not rephrase your answer.
    - Do not output anything after the answer.

    Question: {question}

    Context:
    {context}

    Answer:

settings:
  data_dir: data/manuals
  index_dir: indices
  force_rebuild_index: false
  use_cpu: true

  show_chunks: true
  show_query_time: true
  show_token_speed: true
  show_chunk_timing: true

hitl:
  review_keywords:
    - dosage
    - treatment
    - compliance
    - gmp
    - validation
  response_length_threshold: 800
  response_preview_chars: 280
  model_version: model-version-placeholder
  prompt_version: prompt-v1
  signoff_endpoint_template: /review/{review_id}/signoff
  signoff_help: Use GET /review/{review_id}/signoff to fetch ready-to-run approval and rejection examples.

review_store:
  sqlite_path: data/reviews/review_queue.sqlite3

audit:
  log_path: data/audit/audit_log.jsonl

feedback:
  corrections_path: data/feedback/corrections.jsonl
  quality_path: data/feedback/quality_ratings.jsonl
  metadata_sqlite_path: data/feedback/result_metadata.sqlite3

compliance:
  default_regulation_system: TestSystem
  document_excerpt_chars: 4000
  audit_excerpt_chars: 1200
  sqlite_path: data/compliance/assessments.sqlite3
  pool_sqlite_path: data/compliance/regulation_pools.sqlite3
  regulation_pools: []

ui:
  telemetry_refresh_seconds: 5

security:
  api_key: ""
  api_key_env_var: KRIONIS_REVIEW_API_KEY

system_metadata:
  system_name: Krionis HITL RAG API
  version: 1.1.0
  component_type: GAMP Category 5
  agent_system_id: krionis-rag-api
  module_classification:
    configuration:
      - config/system.yaml
    custom_modules:
      - rag_llm_api_pipeline/core
      - rag_llm_api_pipeline/db
      - rag_llm_api_pipeline/api
      - rag_llm_api_pipeline/ui
